name: Deploy OPIc Memorizer

on:
  push:
    branches:
      - main
    paths:
      - apps/opic-memorizer/**
      - outputs/opic/2026-04-22/**
      - .github/workflows/deploy-opic-memorizer.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/opic-memorizer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: apps/opic-memorizer/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Generate study data
        run: npm run build:data

      - name: Validate generated study data
        run: npm run validate:data

      - name: Run tests
        run: npm test

      - name: Build static site
        run: npm run build
        env:
          VITE_BASE_PATH: /opic_agent/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/opic-memorizer/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
